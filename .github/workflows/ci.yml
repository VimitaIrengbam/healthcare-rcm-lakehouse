name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"   # required by PySpark for the unit tests
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Run PySpark unit tests
        run: pytest -q

  deploy:
    name: Deploy Databricks bundle
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for Databricks credentials
        id: creds
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          if [ -n "$DATABRICKS_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DATABRICKS_TOKEN secret not set — skipping bundle deploy. \
            Add DATABRICKS_HOST and DATABRICKS_TOKEN repo secrets to enable deployment."
          fi
      - uses: databricks/setup-cli@main
        if: steps.creds.outputs.present == 'true'
      - name: Validate & deploy bundle
        if: steps.creds.outputs.present == 'true'
        working-directory: databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle validate -t dev
          databricks bundle deploy -t dev
