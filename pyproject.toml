[tool.ruff]
line-length = 110
target-version = "py311"
extend-exclude = ["databricks/**/0*_*.py", "databricks/**/*_*.py"]  # notebooks use Databricks globals (spark/display)

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
filterwarnings = ["ignore::DeprecationWarning"]
